<main class="auth-page">
  <section class="auth-panel">
    <div class="brand compact">
      <div class="brand-mark">LM</div>
      <div>
        <strong>LastMile Optimizer</strong>
        <span>Alejandro Ospina</span>
      </div>
    </div>

    <h1>Iniciar sesion</h1>
    <p class="muted">Gestion de entregas y rutas de ultima milla.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="form">
      <label>
        Email
        <input type="email" formControlName="email" autocomplete="email" />
      </label>
      <label>
        Password
        <input type="password" formControlName="password" autocomplete="current-password" />
      </label>

      <div class="alert error" *ngIf="error">{{ error }}</div>

      <button type="submit" class="primary full" [disabled]="loading">
        {{ loading ? 'Ingresando...' : 'Login' }}
      </button>
    </form>

    <div class="demo-box">
      <strong>Credenciales demo</strong>
      <span>admin@lastmile.test / Admin123*</span>
      <span>alejandro@lastmile.test / Admin123*</span>
    </div>

    <p class="auth-link">No tienes cuenta? <a routerLink="/register">Registrate</a></p>
  </section>
</main>
