<main class="auth-page">
  <section class="auth-panel">
    <div class="brand compact">
      <div class="brand-mark">LM</div>
      <div>
        <strong>LastMile Optimizer</strong>
        <span>Alejandro Ospina</span>
      </div>
    </div>

    <h1>Crear cuenta</h1>
    <p class="muted">El registro inicia sesion automaticamente.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="form">
      <label>
        Nombre completo
        <input type="text" formControlName="fullName" autocomplete="name" />
      </label>
      <label>
        Email
        <input type="email" formControlName="email" autocomplete="email" />
      </label>
      <label>
        Password
        <input type="password" formControlName="password" autocomplete="new-password" />
      </label>

      <div class="alert error" *ngIf="error">{{ error }}</div>

      <button type="submit" class="primary full" [disabled]="loading">
        {{ loading ? 'Creando...' : 'Registrarme' }}
      </button>
    </form>

    <p class="auth-link">Ya tienes cuenta? <a routerLink="/login">Inicia sesion</a></p>
  </section>
</main>
